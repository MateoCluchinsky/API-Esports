spring.application.name=esports

# Conexión a la base de datos (El 'createDatabaseIfNotExist=true' crea la BD por nosotros)
spring.datasource.url=jdbc:mysql://localhost:3306/esports_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate: Crea y actualiza las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=MI_CLAVE_SECRETA_SUPER_SEGURA_ESPORTS_2026_API